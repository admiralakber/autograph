name: Deploy to GitHub Pages

# Builds the Vite app in web/ and publishes web/dist to GitHub Pages.
# The site is a PROJECT site, so Vite's base is /autograph/ (see web/vite.config.ts).
# Enable once: repo Settings → Pages → Build and deployment → Source: "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        # npm install (not ci): Rolldown/Vite resolve platform-specific optional
        # deps (@emnapi/*) whose lockfile presence varies by npm version, which makes
        # `npm ci`'s exact-match check brittle on the runner. The build is deterministic.
        run: npm install --no-audit --no-fund

      - name: Type-check and build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
